name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check for @/ imports (must use relative imports)
        run: |
          if grep -rn --include='*.ts' --include='*.tsx' "from ['\"]@/" src/; then
            echo "❌ Found @/ imports — use relative imports instead (see README)"
            exit 1
          fi
          echo "✅ No @/ imports found"
