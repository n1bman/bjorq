<!doctype html>
<html lang="sv" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Lovable App</title>
    <meta name="description" content="Lovable Generated Project" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Lovable App" />
    <meta property="og:description" content="Lovable Generated Project" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"><p style="color:white;padding:2rem;font-family:system-ui">Loading…</p></div>
    <script type="module" src="/src/main.tsx" onerror="document.body.innerHTML='<pre style=color:red;padding:2rem>Module failed to load</pre>'"></script>
    <script>
      // Fallback: if nothing renders in 5s, show diagnostic
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.innerText === 'Loading…') {
          root.innerHTML = '<pre style="color:orange;padding:2rem;font-family:system-ui">⚠ JS bundle did not load after 5s.\nCheck browser console (F12) for errors.\nThis usually means a Vite compilation error.</pre>';
        }
      }, 5000);
    </script>
  </body>
</html>
