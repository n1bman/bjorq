<!doctype html>
<html lang="sv" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BJORQ Dashboard</title>
    <meta
      name="description"
      content="BJORQ Dashboard - Smart hem-kontrollpanel med 3D-vy, Home Assistant-integration och enhetsstyrning."
    />
    <meta name="author" content="BJORQ" />
    <meta name="theme-color" content="#0a0a0f" />

    <meta property="og:title" content="BJORQ Dashboard" />
    <meta
      property="og:description"
      content="Smart hem-kontrollpanel med 3D-vy och Home Assistant-integration."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo-text.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/logo-text.png" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/favicon.png" />
  </head>

  <body>
    <div id="root"><p style="color:white;padding:2rem;font-family:system-ui">Loading...</p></div>
    <script>
      window.__BJORQ_APP_BOOTED__ = false;
    </script>
    <script
      type="module"
      src="/src/main.tsx"
      onerror="document.body.innerHTML='<pre style=color:red;padding:2rem>Module failed to load</pre>'"
    ></script>
    <script>
      setTimeout(function () {
        var root = document.getElementById("root");
        if (!window.__BJORQ_APP_BOOTED__ && root && root.innerText === "Loading...") {
          root.innerHTML =
            '<pre style="color:orange;padding:2rem;font-family:system-ui">Dashboarden laddar langsammare an vantat.\nPa aldre iPad-modeller kan forsta starten ta lite langre tid.</pre>';
        }
      }, 15000);
    </script>
  </body>
</html>
